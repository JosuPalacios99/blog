<link rel="icon" type="image/svg+xml" href="{{ "favicon.svg" | relURL }}">
<link rel="mask-icon" href="{{ "favicon.svg" | relURL }}" color="#e5484d">

{{- /* Analítica GoatCounter (sin cookies). Solo en producción, para no contar
       las visitas del `hugo server` local. Se activa poniendo params.goatcounter. */ -}}
{{- with site.Params.goatcounter }}
{{- if hugo.IsProduction }}
<script data-goatcounter="https://{{ . }}.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
{{- end }}
{{- end }}
