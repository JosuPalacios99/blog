baseURL = "https://josupalacios99.github.io/blog/"
theme = "PaperMod"
defaultContentLanguage = "es"

# Pagination
[pagination]
  pagerSize = 10

# Code syntax highlighting
[markup]
  [markup.highlight]
    style = "dracula"
    lineNos = true
    noClasses = true
    guessSyntax = true
  [markup.goldmark.renderer]
    unsafe = true  # allow raw HTML in markdown

# Enable search output (PaperMod fuse.js search)
[outputs]
  home = ["HTML", "RSS", "JSON"]

# Taxonomies (tags, categorías y series de posts)
[taxonomies]
  tag = "tags"
  category = "categories"
  series = "series"

[params]
  author = "j0su"
  defaultTheme = "dark"
  ShowReadingTime = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  ShowBreadCrumbs = true
  ShowPostNavLinks = true
  ShowWordCount = true
  mainSections = ["posts"]
  displayFullLangName = true

  # cover solo en tarjetas (home/listado), no dentro del post
  [params.cover]
    hiddenInSingle = true

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/JosuPalacios99"

# ===================== Idiomas =====================
[languages]
  [languages.es]
    languageCode = "es-ES"
    title = "root@j0su"
    weight = 1
    copyright = "© 2026 **root@j0su** · pensar como el adversario"
    [languages.es.params]
      flag = "🇪🇸"
    [[languages.es.menus.main]]
      identifier = "posts"
      name = "Posts"
      url = "/posts/"
      weight = 10
    [[languages.es.menus.main]]
