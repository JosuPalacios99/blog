baseURL = "https://CHANGE-ME.github.io/"
locale = "en-us"
title = "RedTeam Notes"
theme = "PaperMod"

# Pagination
[pagination]
  pagerSize = 10

# Code syntax highlighting
[markup]
  [markup.highlight]
    style = "dracula"
    lineNos = true
    noClasses = true
    guessSyntax = true
  [markup.goldmark.renderer]
    unsafe = true  # allow raw HTML in markdown

[params]
  defaultTheme = "dark"
  ShowReadingTime = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  ShowBreadCrumbs = true
  ShowPostNavLinks = true
  ShowWordCount = true
  homeInfoParams.Title = "RedTeam Notes"
  homeInfoParams.Content = "Offensive security writeups, TTPs, tooling, and lab notes."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/CHANGE-ME"

# Top menu
[[menu.main]]
  identifier = "posts"
  name = "Posts"
  url = "/posts/"
  weight = 10
[[menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 20
[[menu.main]]
  identifier = "search"
  name = "Search"
  url = "/search/"
  weight = 30

# Enable search output (PaperMod fuse.js search)
[outputs]
  home = ["HTML", "RSS", "JSON"]
